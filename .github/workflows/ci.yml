name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: workbase_test
          POSTGRES_USER: workbase
          POSTGRES_PASSWORD: workbase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workbase"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: dotnet restore WorkBase.sln

      - name: Build
        run: dotnet build WorkBase.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test WorkBase.sln --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__WorkBase: "Host=localhost;Port=5432;Database=workbase_test;Username=workbase;Password=workbase"

      - name: Generate OpenAPI spec
        run: |
          dotnet run --project src/WorkBase.Host/WorkBase.Host.csproj --configuration Release --urls "http://localhost:5099" &
          APP_PID=$!
          sleep 10
          mkdir -p artifacts
          curl -sf http://localhost:5099/openapi/v1.json -o artifacts/openapi.json
          kill $APP_PID || true
        env:
          ConnectionStrings__WorkBase: "Host=localhost;Port=5432;Database=workbase_test;Username=workbase;Password=workbase"
        continue-on-error: true

      - name: Upload OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: artifacts/openapi.json
          if-no-files-found: warn

