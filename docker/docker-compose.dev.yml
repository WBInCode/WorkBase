services:
  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16
    container_name: workbase-postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-workbase}
      POSTGRES_USER: ${DATABASE_USER:-workbase}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-workbase}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-workbase} -d ${DATABASE_NAME:-workbase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Keycloak 24 (IAM / OIDC) ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: workbase-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME:-workbase}
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: ${DATABASE_USER:-workbase}
      KC_DB_PASSWORD: ${DATABASE_PASSWORD:-workbase}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --- MinIO (S3-compatible file storage) ---
  minio:
    image: minio/minio:latest
    container_name: workbase-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Seq (structured logging UI) ---
  seq:
    image: datalust/seq:latest
    container_name: workbase-seq
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seqdata:/data

  # --- WorkBase API ---
  workbase-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: workbase-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DATABASE_NAME:-workbase};Username=${DATABASE_USER:-workbase};Password=${DATABASE_PASSWORD:-workbase}"
      Keycloak__Authority: "http://keycloak:8080/realms/${KEYCLOAK_REALM:-workbase}"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "${MINIO_ACCESS_KEY:-minioadmin}"
      Storage__SecretKey: "${MINIO_SECRET_KEY:-minioadmin}"
      Storage__Bucket: "${MINIO_BUCKET:-workbase}"
      Storage__UseSSL: "false"
      Serilog__WriteTo__Seq__ServerUrl: "http://seq:5341"
      Hangfire__DashboardEnabled: "true"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_started
      seq:
        condition: service_started

volumes:
  pgdata:
  miniodata:
  seqdata:
