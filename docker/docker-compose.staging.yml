# WorkBase — Staging Environment
# Copy to /opt/workbase/ on the staging server

services:
  # --- PostgreSQL 16 ---
  postgres:
    image: postgres:16
    container_name: workbase-postgres
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-workbase}
      POSTGRES_USER: ${DATABASE_USER:-workbase}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
      - ./docker/postgres/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-workbase} -d ${DATABASE_NAME:-workbase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Keycloak 24 ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: workbase-keycloak
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME:-workbase}
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: ${DATABASE_USER:-workbase}
      KC_DB_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-auth.workbase.local}
      KC_PROXY: edge
    command: start --import-realm --optimized
    volumes:
      - ./docker/keycloak/workbase-realm.json:/opt/keycloak/data/import/workbase-realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M

  # --- MinIO ---
  minio:
    image: minio/minio:latest
    container_name: workbase-minio
    restart: always
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?Set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?Set MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # --- Seq (logging) ---
  seq:
    image: datalust/seq:latest
    container_name: workbase-seq
    restart: always
    ports:
      - "127.0.0.1:5341:5341"
      - "127.0.0.1:8081:80"
    environment:
      ACCEPT_EULA: "Y"
    volumes:
      - seqdata:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # --- WorkBase API ---
  workbase-api:
    image: ${API_IMAGE:-ghcr.io/wbincode/workbase/workbase-api:latest}
    container_name: workbase-api
    restart: always
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${DATABASE_NAME:-workbase};Username=${DATABASE_USER:-workbase};Password=${DATABASE_PASSWORD}"
      Keycloak__Authority: "http://keycloak:8080/realms/${KEYCLOAK_REALM:-workbase}"
      Keycloak__Audience: "workbase-api"
      Keycloak__RequireHttpsMetadata: "false"
      Storage__Endpoint: "minio:9000"
      Storage__AccessKey: "${MINIO_ACCESS_KEY}"
      Storage__SecretKey: "${MINIO_SECRET_KEY}"
      Storage__Bucket: "${MINIO_BUCKET:-workbase}"
      Storage__UseSSL: "false"
      Serilog__WriteTo__0__Args__serverUrl: "http://seq:5341"
      Cors__AllowedOrigins__0: "${FRONTEND_URL:-https://app.workbase.local}"
      Integration__EncryptionKey: "${INTEGRATION_ENCRYPTION_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # --- Frontend (Nginx + SPA) ---
  workbase-frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/wbincode/workbase/workbase-frontend:latest}
    container_name: workbase-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      workbase-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  miniodata:
  seqdata:
