# WorkBase - Render Blueprint (Neon as DB)
#
# Po pierwszym deploy:
#  1. W Neon SQL Editor wykonaj: CREATE SCHEMA IF NOT EXISTS keycloak;
#  2. W Render dashboard dla obu serwisow wpisz NEON_PASSWORD (haslo z Neon)
#  3. Manual Deploy obu serwisow

services:
  # --- Backend API (.NET 9) ---
  - type: web
    name: workbase-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./docker/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: NEON_PASSWORD
        sync: false
      - key: ConnectionStrings__DefaultConnection
        value: "Host=ep-restless-fog-alz3p9w0-pooler.c-3.eu-central-1.aws.neon.tech;Database=neondb;Username=neondb_owner;Password=${NEON_PASSWORD};SslMode=Require;Trust Server Certificate=true"
      - key: Keycloak__Authority
        value: https://workbase-auth.onrender.com/realms/workbase
      - key: Keycloak__Admin__Username
        value: admin
      - key: Keycloak__Admin__Password
        sync: false
      - key: Cors__AllowedOrigins__0
        value: https://work-base-roan.vercel.app
      - key: Cors__AllowedOrigins__1
        value: http://localhost:5173

  # --- Keycloak 24 ---
  - type: web
    name: workbase-auth
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./docker/Dockerfile.keycloak
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: KC_DB
        value: postgres
      - key: NEON_PASSWORD
        sync: false
      # Direct endpoint (bez -pooler) - Keycloak nie lubi pgBouncera
      - key: KC_DB_URL
        value: jdbc:postgresql://ep-restless-fog-alz3p9w0.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require
      - key: KC_DB_USERNAME
        value: neondb_owner
      - key: KC_DB_PASSWORD
        value: ${NEON_PASSWORD}
      - key: KC_DB_SCHEMA
        value: keycloak
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        generateValue: true
      - key: KC_HOSTNAME
        value: workbase-auth.onrender.com
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_PROXY
        value: edge
      - key: KC_HTTP_ENABLED
        value: "true"
